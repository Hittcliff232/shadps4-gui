<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShadPS4 Boot</title>
<style>
html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at center, #0b132b, #000);
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.8s ease;
}

.container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.logo {
    font-size: 42px;
    letter-spacing: 6px;
    font-weight: 300;
    color: #e6f0ff;
    text-shadow: 0 0 10px rgba(70,140,255,.8), 0 0 30px rgba(70,140,255,.5), 0 0 60px rgba(70,140,255,.2);
    opacity: 0;
    filter: blur(12px);
}

@keyframes logoAnim {
    0% {
        opacity: 0;
        filter: blur(20px);
        transform: scale(1.08);
    }
    35% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
    }
    75% {
        opacity: 1;
    }
    100% {
        opacity: 0;
        transform: scale(.96);
    }
}

.copyright {
    position: absolute;
    bottom: 11%;
    text-align: center;
    font-size: 14px;
    line-height: 1.6;
    color: #9db4d6;
    opacity: 0;
    animation: copyrightAnim 3s forwards;
    animation-delay: 2s;
}

.copyright strong {
    color: #ffffff;
    font-weight: 500;
}

@keyframes copyrightAnim {
    0% {
        opacity: 0;
        transform: translateY(8px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

.progress-bar {
    position: absolute;
    bottom: 5%;
    left: 30%;
    right: 30%;
    height: 2px;
    background: rgba(70, 140, 255, 0.2);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    animation: progressFadeIn 1s forwards;
    animation-delay: 4.5s;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4688ff, #8ab2ff);
    border-radius: 2px;
    animation: progressFill 2s forwards;
    animation-delay: 5s;
}

@keyframes progressFadeIn {
    to { opacity: 1; }
}

@keyframes progressFill {
    to { width: 100%; }
}

.skip-hint {
    position: absolute;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    cursor: pointer;
    transition: color 0.3s;
    opacity: 0;
    animation: hintFadeIn 1s forwards;
    animation-delay: 2s;
}

.skip-hint:hover {
    color: rgba(255,255,255,0.8);
}

@keyframes hintFadeIn {
    to { opacity: 1; }
}
</style>
</head>
<body>
<div class="container">
    <div class="logo">SHADPS4</div>
    <div class="copyright">
        © 2026 ShadPS4 Project<br><br>
        <strong>ShadPS4</strong> разработан <strong>George Moralis</strong><br>
        Launcher разработан <strong>Константин Хандога (Hittcliff)</strong>
    </div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="skip-hint" onclick="window.chrome.webview.postMessage('skip-splash')">
        [ Нажмите, чтобы пропустить ]
    </div>
</div>
<script>
window.addEventListener('load', function() {
    window.chrome.webview.postMessage('preview-loaded');
    
    // Отслеживаем завершение прогресс-бара
    const progressFill = document.querySelector('.progress-fill');
    if (progressFill) {
        progressFill.addEventListener('animationend', function() {
            window.chrome.webview.postMessage('progress-complete');
        });
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
        e.preventDefault();
        window.chrome.webview.postMessage('skip-splash');
    }
});
</script>
</body>
</html>
